app = "hawky-adoption"
primary_region = "bom"   # Mumbai — closest to Mixpanel India + your team

[build]
  # Uses the Dockerfile in this directory.

[env]
  STREAKS_DB_PATH = "/data/streaks.db"
  STREAKS_AUTH_USER = "hawky"
  # MIXPANEL_*, FLASK_SECRET_KEY, STREAKS_AUTH_PASSWORD live in `fly secrets`.

[mounts]
  source = "streaks_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # The RefreshDaemon thread must stay alive to do the 15-min auto refresh.
  # Don't let Fly suspend the VM on idle.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  # Health check hits the public /healthz route (excluded from Basic Auth).
  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
